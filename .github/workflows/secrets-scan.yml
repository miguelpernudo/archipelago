# Scan commits for secrets (tokens, keys, etc.)
# using gitleaks. If anything is found, the workflow fails.

name: Secrets scan

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_COMMIT_FROM: ${{ github.event.before }}
          GITLEAKS_COMMIT_TO: ${{ github.event.after }}
