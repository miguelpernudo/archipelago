# Validates homelab configurations in every push/pull request.
# - bridge: shell scripts + hostapd
# - nix: evaluates the flake (syntax and module options)

name: CI

on: [push, pull_request]

jobs:
  bridge:
    name: Bridge (Alpine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shellcheck scripts
        run: |
          touch bridge/secrets.env
          shellcheck -x bridge/install.sh bridge/health/*.sh bridge/etc/init.d/*

      - name: Verify POSIX syntax
        run: sh -n bridge/install.sh bridge/health/*.sh

      - name: Validate hostapd
        run: |
          sudo apt-get install -y -qq hostapd gettext
          RADIUS_SECRET=dummy_test_pass \
            envsubst '${RADIUS_SECRET}' < bridge/etc/hostapd/hostapd.conf > /tmp/hostapd.test.conf
          sudo hostapd -t /tmp/hostapd.test.conf

  nix:
    name: NixOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - name: Evaluate flake
        run: nix flake check
        working-directory: nix
